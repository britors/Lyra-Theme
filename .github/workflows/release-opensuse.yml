name: Release RPMs (openSUSE)

# Builda o tema e os ícones em RPMs independentes a partir dos specs em
# packaging/opensuse/ e anexa os dois na GitHub Release da tag empurrada.
# Depois avisa o openSUSE Build Service (home:rodrigosbrito:lyra/lyra-theme)
# pra buscar a mesma tag e rebuildar "de verdade" (o pacote lá tem seu
# próprio _service com tar_scm, configurado direto no OBS, fora deste repo).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: opensuse/tumbleweed:latest
    steps:
      - name: Instalar dependências de build
        run: |
          zypper --non-interactive install -y tar gzip git sassc ImageMagick nodejs \
            rpm-build rpmdevtools

      - uses: actions/checkout@v4

      - name: Buildar os RPMs
        run: |
          version="${GITHUB_REF_NAME#v}"
          rpmdev-setuptree
          tar czf "$HOME/rpmbuild/SOURCES/lyra-theme-src.tar.gz" \
            --exclude='.git' \
            --exclude='dist' \
            --exclude='Lyra-Enterprise.tar.xz' \
            .
          rpmbuild -bb --define "version $version" packaging/opensuse/lyra-enterprise-theme.spec
          rpmbuild -bb --define "version $version" packaging/opensuse/lyra-enterprise-icons.spec

      - name: Coletar RPMs finais (sem debuginfo/debugsource)
        run: |
          mkdir -p rpms
          find "$HOME/rpmbuild/RPMS/noarch" -maxdepth 1 -name '*.rpm' \
            ! -name '*debuginfo*' ! -name '*debugsource*' -exec cp {} rpms/ \;
          ls -lh rpms/

      - name: Validar instalação
        run: |
          zypper --non-interactive --no-gpg-checks install -y rpms/*.rpm
          test -f /usr/share/themes/Lyra-Enterprise/gnome-shell/gnome-shell.css
          test -f /usr/share/themes/Lyra-Enterprise-Light/gnome-shell/gnome-shell.css
          test -f /usr/share/plymouth/themes/Lyra-Enterprise/lyra-enterprise.plymouth
          test -f /usr/share/grub/themes/Lyra-Enterprise/theme.txt
          test -d /usr/share/icons/Lyra-Enterprise-Icons
          test -f /usr/share/glib-2.0/schemas/99-lyra-enterprise.gschema.override
          test -f /etc/skel/.config/neofetch/config.conf
          grep -Fqx 'GRUB_THEME="/usr/share/grub/themes/Lyra-Enterprise/theme.txt"' \
            /etc/default/grub
          test "$(plymouth-set-default-theme)" = Lyra-Enterprise

      - uses: actions/upload-artifact@v4
        with:
          name: opensuse-rpms
          path: rpms/*.rpm

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: opensuse-rpms
          path: rpms

      - name: Publicar RPMs na release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --title "$tag" --generate-notes
          fi
          gh release upload "$tag" rpms/*.rpm --repo "$GITHUB_REPOSITORY" --clobber
          gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --draft=false

  # Dispara o build no openSUSE Build Service (home:rodrigosbrito:lyra),
  # que tem seu próprio _service (tar_scm buscando a tag direto do GitHub)
  # no pacote lyra-theme — este job só avisa o OBS pra rebuscar e
  # rebuildar, via
  # https://openbuildservice.org/help/manuals/obs-user-guide/cha-obs-authorization-token
  # Token escopado só pra "runservice" no pacote lyra-theme (osc token
  # --create home:rodrigosbrito:lyra lyra-theme runservice), guardado
  # como secret OBS_TOKEN_LYRA_THEME. Depende só de `publish` (a release
  # do GitHub já está no ar antes de avisar o OBS) e é best-effort: falha
  # aqui não desfaz a release.
  trigger-obs:
    needs: publish
    runs-on: ubuntu-latest
    env:
      OBS_API: https://api.opensuse.org
      OBS_PROJECT: home:rodrigosbrito:lyra
      OBS_PACKAGE: lyra-theme
    steps:
      # O contexto `secrets` não pode ser referenciado direto num `if:` de
      # step (erro do parser do Actions) — passa por env: e faz o "pular
      # se não configurado" dentro do próprio shell.
      - name: Disparar rebuild no OBS (lyra-theme)
        if: always()
        env:
          OBS_TOKEN: ${{ secrets.OBS_TOKEN_LYRA_THEME }}
        run: |
          if [ -z "$OBS_TOKEN" ]; then
            echo "OBS_TOKEN_LYRA_THEME não configurado, pulando." >&2
            exit 0
          fi
          curl -fsS -H "Authorization: Token $OBS_TOKEN" \
            -X POST "$OBS_API/trigger/runservice?project=$OBS_PROJECT&package=$OBS_PACKAGE"
